# GitHub Actions CI for the KHR Character sandbox.
#
# Four merge gates (see docs/ci.md):
#   1. Compile clean         — implicit in the game-ci test run (a compile error fails the run).
#   2. Tests green + floor    — PlayMode tests pass AND total >= floor (anti "0 tests = false green").
#   3. glTF-Validator         — 0 errors on every exported GLB (no Unity needed).
#   4. Round-trip goldens     — no un-acknowledged change to the normalized wire snapshot.
#
# Render-pipeline matrix: Built-in is the REQUIRED gate; URP is a non-blocking nightly axis (TODO at the bottom).
# The KHR test / glTF-validation / golden gates are RP-agnostic (they decode/validate the wire), so they run on
# the Built-in cell and pass identically anywhere.
#
# SETUP (one-time): add a repository secret `UNITY_LICENSE` containing a Unity *Personal* license file (.ulf).
# Activate locally once with game-ci's request/activation flow, then paste the .ulf contents into the secret.
# See https://game.ci/docs/github/activation and docs/ci.md.

name: CI

on:
  push:
    branches: [main, master, unity-2022]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: "2022.3.76f1"
  # Only the testbed's own tests run in this consumer (Unity 'testables' does not surface a git-package's
  # tests); the floor tracks the sandbox suite. The plugin's ~165 tests gate in the plugin repo / khr-test-proj.
  MIN_TESTS: "120"
  MIN_SANDBOX_TESTS: "120"

jobs:
  # Doc-drift lint (no Unity): fail fast if any Unity version string in the docs/workflows disagrees with
  # ProjectSettings/ProjectVersion.txt (the single source of truth). Cheap guard against the README/docs
  # advertising an editor version the project doesn't actually use.
  doc-version-lint:
    name: Doc version lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs Unity version == ProjectVersion.txt
        run: bash ./Tools/ci/check-docs-version.sh

  # Package-resolution preflight (no Unity): the project pins UnityGLTF to a personal fork by commit SHA (a
  # single point of failure). Fail fast — before burning Unity CI minutes on a doomed UPM resolve — if that pin
  # is unreachable, the SHA was force-pushed away, or manifest/lock/README have drifted out of agreement.
  package-pin-preflight:
    name: Package pin preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pinned UnityGLTF fork is reachable + consistent
        run: bash ./Tools/ci/check-package-pin.sh

  # License-compliance lint (no Unity): every committed Assets/SampleAssets/**/*.glb must have a provenance row
  # in ATTRIBUTION.md (source + SPDX). Matters for a public repo whose hero + variants are non-commercial VRM.
  attribution-check:
    name: Attribution check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every committed .glb has an ATTRIBUTION.md row
        run: bash ./Tools/ci/check-attribution.sh

  # GATE 1 (compile) + GATE 2 (tests + min-test-count floor). Built-in RP, required.
  tests:
    name: Tests (Unity 2022.3.76f1, Built-in)
    needs: package-pin-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Library cache keyed on the dependency fingerprint: manifest + the resolved package SHA in packages-lock
      # + the editor version. A new/force-pushed dependency commit changes packages-lock and busts the cache.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-builtin-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-builtin-

      - name: Run PlayMode tests (game-ci)
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: artifacts/test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          # No -nographics here: game-ci provides an xvfb display, so this also supports future demo-render tests.
          # (The local Tools/ci scripts use -nographics for the wire-only suite.)

      # GATE 2 floor: only the testbed's own tests run here (Unity 'testables' does not surface a git-package's
      # tests into a consumer), so the floor tracks the sandbox suite. A hollow package resolve instead fails
      # GATE 1 compile (Sandbox.Tests links real plugin types); the plugin's ~165 tests gate in the plugin repo.
      - name: Enforce test gate + min-test-count floor
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          xml="$(find artifacts/test-results -name '*.xml' | head -n1 || true)"
          if [ -z "$xml" ]; then echo "GATE 2 FAILED: no results XML (hang/crash)."; exit 1; fi
          attr() { tr '\n' ' ' < "$xml" | sed -n 's/.*<test-run[^>]*[[:space:]]'"$1"'="\([0-9]*\)".*/\1/p' | head -n1; }
          total="$(attr total)"; failed="$(attr failed)"; inc="$(attr inconclusive)"; sk="$(attr skipped)"
          total="${total:-0}"; failed="${failed:-0}"; inc="${inc:-0}"; sk="${sk:-0}"
          sandbox="$(tr '\n' ' ' < "$xml" | grep -o '<test-case[^>]*classname="KhrCharacterTestbed[^"]*"' | wc -l | tr -d '[:space:]' || true)"
          sandbox="${sandbox:-0}"
          echo "total=$total failed=$failed inconclusive=$inc skipped=$sk sandbox=$sandbox (floor=${MIN_TESTS}, sandbox-floor=${MIN_SANDBOX_TESTS})"
          if [ "$failed" != "0" ] || [ "$inc" != "0" ] || [ "$sk" != "0" ]; then echo "GATE 2 FAILED: failed/inconclusive/skipped must be 0."; exit 1; fi
          if [ "$total" -lt "$MIN_TESTS" ]; then echo "GATE 2 FAILED (floor): ran $total, need >= ${MIN_TESTS} (sandbox suite did not run?)"; exit 1; fi
          if [ "$sandbox" -lt "$MIN_SANDBOX_TESTS" ]; then echo "GATE 2 FAILED (sandbox sub-floor): ran $sandbox, need >= ${MIN_SANDBOX_TESTS} — testbed suite hollow?"; exit 1; fi
          echo "GATE 2 PASS."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results

  # GATE 3 (glTF-Validator) — no Unity; validates the committed fixtures with the official Khronos CLI.
  gltf-validator:
    name: glTF-Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install glTF-Validator + jq
        run: |
          npm i -g gltf-validator
          sudo apt-get update && sudo apt-get install -y jq
      - name: Validate exported GLBs (numErrors == 0)
        run: bash ./Tools/ci/validate-glb.sh --input-dir Assets/SampleAssets/Synthetic --required

  # GATE 4 (round-trip goldens) — re-export + normalize the wire under Unity, then diff against committed goldens.
  goldens:
    name: Round-trip goldens
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-builtin-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-builtin-
      # NOTE: game-ci's unity-builder is used here only as a licensed headless Unity host that runs our
      # `-executeMethod` seam (buildMethod). SandboxCI.ExportGoldens writes Artifacts/snapshots/*.json. Depending
      # on your game-ci version you may instead activate a license + invoke Tools/ci/export-goldens.sh directly;
      # repo-architect owns final CI wiring. The gate itself (the diff below) is provider-agnostic.
      - name: Export normalized snapshots (SandboxCI.ExportGoldens)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildMethod: Samples.Editor.SandboxCI.ExportGoldens
          allowDirtyBuild: true
      - name: Diff snapshots against committed goldens
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          goldens=(Tests/Golden/*.json)
          if [ ${#goldens[@]} -eq 0 ]; then
            echo "No committed goldens yet — run Tools/ci/Export-Goldens -Update locally and commit. Skipping."
            exit 0
          fi
          fail=0
          for g in "${goldens[@]}"; do
            s="Artifacts/snapshots/$(basename "$g")"
            if [ ! -f "$s" ]; then echo "MISSING snapshot $s"; fail=1; continue; fi
            if ! diff -u "$g" "$s"; then fail=1; fi
          done
          if [ $fail -ne 0 ]; then echo "GATE 4 FAILED — wire drift. If intentional: Export-Goldens -Update + commit."; exit 1; fi
          echo "GATE 4 PASS."

  # ── TODO: URP nightly (non-blocking) ────────────────────────────────────────────────────────────────────────
  # Add a scheduled (cron) workflow or a matrix axis that runs the `tests` job against a URP-configured project
  # variant (Graphics Settings render pipeline asset + URP shaders in Always-Included). Keep it non-blocking:
  # `continue-on-error: true` or a separate nightly workflow. HDRP is deferred (limited UnityGLTF support).
